<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Madness
<body>

    <header>
        <h1>Multiplication Madness</h1>
        <p>Practice multiplication and English conversation from the book, Minnie's Diner!</p>
        <button id="start-game-btn" onclick="openWelcomeDialog()">Start Game</button>
    </header>

    <hr>

    <dialog id="welcome-dialog">
        <h2>Welcome to Multiplication Madness</h2>
        <p>In this game, you will act as a waiter.</p>
        <ul>
            <li>Listen to the Customer's order in English.</li>
            <li>Drag and drop the correct food items onto the tray.</li>
            <li>Calculate the total price correctly to practice your multiplication.</li>
            <li>Chat with the customer in English to keep them happy!</li>
            <li><strong>Tip: Click an item on the tray if you want to remove it!</strong></li>
        </ul>
        <button onclick="closeWelcomeDialog()">Let's Play!</button>
    </dialog>

    <main>
        <section>
            <h2>1. The Customer Order</h2>
            <div id="order-text"><em>Click "Generate Order" to start...</em></div>
            <button id="generate-order-btn" onclick="generateAIOrder()">Generate AI Order</button>

            <h2>2. Assemble Order (Drag & Drop)</h2>
            <div>
                <div class="draggable-item" draggable="true" data-item="Burger" style="border: 1px solid black; display: inline-block; padding: 5px; margin: 5px; cursor: grab;">🍔 Burger ($5)</div>
                <div class="draggable-item" draggable="true" data-item="Fries" style="border: 1px solid black; display: inline-block; padding: 5px; margin: 5px; cursor: grab;">🍟 Fries ($3)</div>
                <div class="draggable-item" draggable="true" data-item="Soda" style="border: 1px solid black; display: inline-block; padding: 5px; margin: 5px; cursor: grab;">🥤 Soda ($2)</div>
            </div>

            <div id="serving-tray" style="border: 2px dashed gray; min-height: 50px; margin: 15px 0; padding: 10px;">
                Drop items here to serve!
            </div>
            
            <div>
                <h2>3. Calculate Total Price</h2>
                <label for="player-math">Total Price ($): </label>
                <input type="number" id="player-math" placeholder="Your calculation">
                <button onclick="checkOrderAndMath()">Submit Order</button>
            </div>
        </section>

        <hr>

        <section>
            <h2>Customer Conversation</h2>
            <div id="chatLog" style="border: 1px solid black; height: 150px; overflow-y: scroll; padding: 10px; margin-bottom: 10px;">
                <p style="color: #888;">AI customer messages will appear here.</p>
            </div>
            <div>
                <input type="text" id="chatInput" placeholder="Talk to the customer..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
                <button id="send-chat-btn" onclick="sendChatMessage()">Send</button>
            </div>
        </section>
    </main>

    <script>
        // --- PROXY BACKEND CONFIGURATION ---
        const VERCEL_PROXY_URL = 'https://game1-woad-beta.vercel.app/api/chat';

        // --- GAME STATE ---
        let currentOrderData = { items: [], totalCost: 0 };
        let trayItems = [];

        // --- DIALOG / WINDOW LOGIC ---
        const dialog = document.getElementById('welcome-dialog');

        function openWelcomeDialog() {
            dialog.showModal(); 
        }

        function closeWelcomeDialog() {
            dialog.close(); 
            generateAIOrder(); 
        }

        // --- DRAG AND DROP LOGIC ---
        const draggables = document.querySelectorAll('.draggable-item');
        const dropZone = document.getElementById('serving-tray');

        draggables.forEach(draggable => {
            draggable.addEventListener('dragstart', () => draggable.classList.add('dragging'));
            draggable.addEventListener('dragend', () => draggable.classList.remove('dragging'));
        });

        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
        });

        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            const draggingItem = document.querySelector('.dragging');
            if (!draggingItem) return;
            
            const itemType = draggingItem.getAttribute('data-item');
            trayItems.push(itemType);
            
            if(dropZone.innerText.includes("Drop items here")) dropZone.innerText = "";
            
            // Render tray item elements with class tagging for selection cleanup hooks
            dropZone.innerHTML += `<span class="tray-item" data-item="${itemType}" style="border: 1px solid gray; padding: 2px 6px; margin-right: 5px; background: #eee; cursor: pointer; display: inline-block; border-radius: 4px;" title="Click to remove">× ${itemType}</span>`;
        });

        // --- CLICK TO DELETE ELEMENT MECHANIC ---
        dropZone.addEventListener('click', e => {
            const clickedSpan = e.target.closest('.tray-item');
            if (!clickedSpan) return;

            const itemType = clickedSpan.getAttribute('data-item');
            
            // Delete exactly 1 historical index match instance of that value item inside data arrays
            const targetIndex = trayItems.indexOf(itemType);
            if (targetIndex > -1) {
                trayItems.splice(targetIndex, 1);
            }

            // Remove visual selector token container item right off browser screen viewports
            clickedSpan.remove();

            if (trayItems.length === 0) {
                dropZone.innerText = "Drop items here to serve!";
            }
        });

        // --- VERCEL PROXY AI API COMMUNICATION ---
        async function callGemini(promptText) {
            try {
                const response = await fetch(VERCEL_PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ promptText: promptText })
                });
                
                const data = await response.json();
                
                // Read clean unified data outputs sent directly from your custom Vercel handler
                if (data.text) return data.text;
                if (data.reply) return data.reply;
                return typeof data === 'string' ? data : JSON.stringify(data);
            } catch (error) {
                console.error("Proxy Connection Error Trace:", error);
                return null;
            }
        }

        // --- GAME ACTIONS ---
        async function generateAIOrder() {
            const orderTextElement = document.getElementById('order-text');
            const
